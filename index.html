<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPL League Tracker</title>
  <style>
    :root {
      --green:  #00ff87;
      --purple: #37003c;
      --card-bg: #1e0628;
      --text:   #f0e6f6;
      --muted:  #a07bb5;
      --red:    #ff4d4d;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--purple);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 { font-size: 2rem; font-weight: 800; color: var(--green); }
    header p  { color: var(--muted); font-size: 0.875rem; margin-top: 4px; }

    /* ── Section wrapper ── */
    .section {
      max-width: 760px;
      margin: 0 auto 32px;
    }
    .section h2 {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* ── Leaderboard ── */
    .leaderboard {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .leaderboard-row {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      transition: background 0.15s;
    }
    .leaderboard-row:last-child { border-bottom: none; }
    .leaderboard-row:hover { background: rgba(255,255,255,0.04); }
    .leaderboard-row.rank-1 { background: rgba(0,255,135,0.06); }
    .pos {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
    }
    .rank-1 .pos { color: var(--green); }
    .rank-2 .pos { color: #c0c0c0; }
    .rank-3 .pos { color: #cd7f32; }
    .player-info .nickname {
      font-weight: 700;
      font-size: 1rem;
    }
    .player-info .team {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .points-col {
      text-align: right;
    }
    .points-col .pts {
      font-size: 1.25rem;
      font-weight: 800;
    }
    .points-col .gw {
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── Gap banner + GIF ── */
    .gap-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    .gap-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      text-align: center;
      flex: 1;
    }
    .gap-label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .gap-value { font-size: 3rem; font-weight: 900; color: var(--green); line-height: 1; }
    .gap-desc  { font-size: 0.9rem; color: var(--muted); margin-top: 8px; }

    .reaction-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      text-align: center;
      min-width: 150px;
    }
    .reaction-card .caption {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .reaction-card img {
      width: 130px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
    }

    /* ── Chart ── */
    .chart-wrap {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      overflow-x: auto;
    }
    canvas { width: 100% !important; }

    /* ── GW leaders table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      font-size: 0.85rem;
    }
    thead tr { background: rgba(255,255,255,0.06); }
    th, td { padding: 9px 14px; text-align: center; }
    th { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    tbody tr:nth-child(even) { background: rgba(255,255,255,0.025); }
    tbody tr:hover { background: rgba(255,255,255,0.06); }
    td.leader-cell { font-weight: 700; color: var(--green); }
    td.gap-cell    { font-weight: 700; color: var(--green); }

    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .error   { text-align: center; padding: 60px 20px; color: var(--red); }

    footer {
      text-align: center;
      margin-top: 48px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* Player dot legend */
    .dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }
  </style>
</head>
<body>

<header>
  <h1>⚽ FPL League Tracker</h1>
  <p id="last-updated">Loading…</p>
</header>

<div id="app"><div class="loading">Fetching league data…</div></div>

<footer>Auto-updates daily · Fantasy Premier League 2024/25</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── Player GIFs ──────────────────────────────────────────────────────────────
const PLAYER_GIFS = {
  'Sindri': { url: 'https://media.giphy.com/media/119pLwyWg8ScTK/giphy.gif',        caption: 'Sindri rn:' },
  'Helgi':  { url: 'https://media.giphy.com/media/l41YvHPauy1qW8uha/giphy.gif',     caption: 'Helgi rn:' },
  'Emmi':   { url: 'https://media.giphy.com/media/12syWGyJ92R8u4/giphy.gif',         caption: 'Emmi rn:' },
  'Olli':   { url: 'https://media.giphy.com/media/qdxDab2ZKCLq3qI6kO/giphy.gif',    caption: 'Olli rn:' },
  'Högni':  { url: 'https://media.giphy.com/media/XGyIdTG6Pa3F0XBpMY/giphy.gif',    caption: 'Högni rn:' },
  'Tommi':  { url: 'https://media.giphy.com/media/a6tiTACLV4JUuN6p7Q/giphy.gif',    caption: 'Tommi rn:' },
  'Maggi':  { url: 'https://media.giphy.com/media/JpLa1IDcoLK2gtzwho/giphy.gif',    caption: 'Maggi rn:' },
};

// ── Player colours ────────────────────────────────────────────────────────────
const PLAYER_COLORS = {
  'Sindri': '#00ff87',
  'Helgi':  '#ff7eb6',
  'Emmi':   '#ffe082',
  'Olli':   '#82d9ff',
  'Högni':  '#ff4d4d',
  'Tommi':  '#c7b3ff',
  'Maggi':  '#ff9f43',
};

const DATA_URL = 'data/fpl_data.json';

async function loadData() {
  const res = await fetch(DATA_URL + '?t=' + Date.now());
  if (!res.ok) throw new Error('Failed to load fpl_data.json');
  return res.json();
}

function formatDate(iso) {
  return new Date(iso).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
}

function render(data) {
  const { managers, gameweeks, last_updated } = data;

  document.getElementById('last-updated').textContent =
    last_updated ? 'Last updated: ' + formatDate(last_updated) : '';

  // Latest GW standings
  const latestGW  = gameweeks[gameweeks.length - 1] || {};
  const standings = latestGW.standings || managers.map(m => ({ ...m, gw_points: 0 }));
  const leader    = latestGW.leader_nickname || (standings[0] && standings[0].nickname) || '';
  const second    = latestGW.second_nickname || (standings[1] && standings[1].nickname) || '';
  const gap       = latestGW.gap ?? 0;

  // Latest GW scores lookup
  const gwScores = {};
  (latestGW.standings || []).forEach(s => { gwScores[s.nickname] = s.gw_points; });

  // GIF for leader
  const gif = PLAYER_GIFS[leader] || null;

  // ── Leaderboard HTML ──
  const leaderboardRows = standings.map((p, i) => {
    const color = PLAYER_COLORS[p.nickname] || '#fff';
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    const gwPts = gwScores[p.nickname] !== undefined ? gwScores[p.nickname] : (p.gw_points || '-');
    return `
      <div class="leaderboard-row ${rankClass}">
        <div class="pos">${i === 0 ? '🏆' : i + 1}</div>
        <div class="player-info">
          <div class="nickname">
            <span class="dot" style="background:${color}"></span>${p.nickname}
          </div>
          <div class="team">${p.team_name}</div>
        </div>
        <div class="points-col">
          <div class="pts">${(p.total_points || 0).toLocaleString()}</div>
          <div class="gw">GW: ${gwPts}</div>
        </div>
      </div>`;
  }).join('');

  // ── GIF panel ──
  const gifPanel = gif ? `
    <div class="reaction-card">
      <div class="caption">${gif.caption}</div>
      <img src="${gif.url}" alt="${leader} reaction gif" />
    </div>` : '';

  // ── GW leaders table ──
  const tableRows = [...gameweeks].reverse().map(gw => `
    <tr>
      <td>GW${gw.gameweek}</td>
      <td class="leader-cell">${gw.leader_nickname || '-'}</td>
      <td>${gw.second_nickname || '-'}</td>
      <td class="gap-cell">+${gw.gap}</td>
    </tr>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="section">
      <h2>Standings</h2>
      <div class="leaderboard">${leaderboardRows}</div>
    </div>

    <div class="section">
      <h2>Gap Between #1 &amp; #2</h2>
      <div class="gap-row">
        <div class="gap-card">
          <div class="gap-label">Current gap</div>
          <div class="gap-value">${gap}</div>
          <div class="gap-desc">${leader} leads ${second} by ${gap} point${gap !== 1 ? 's' : ''}</div>
        </div>
        ${gifPanel}
      </div>
    </div>

    <div class="section">
      <h2>Points Over the Season</h2>
      <div class="chart-wrap">
        <canvas id="lineChart" height="260"></canvas>
      </div>
    </div>

    <div class="section">
      <h2>GW Leaders</h2>
      <table>
        <thead>
          <tr>
            <th>GW</th>
            <th>#1</th>
            <th>#2</th>
            <th>Gap</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  `;

  // ── Line Chart ──
  const nicknames = managers.map(m => m.nickname);
  const labels    = gameweeks.map(gw => 'GW' + gw.gameweek);

  const datasets = nicknames.map(name => {
    const color = PLAYER_COLORS[name] || '#fff';
    const pts   = gameweeks.map(gw => {
      const entry = (gw.standings || []).find(s => s.nickname === name);
      return entry ? entry.total_points : null;
    });
    return {
      label: name,
      data: pts,
      borderColor: color,
      backgroundColor: color + '22',
      borderWidth: 2.5,
      pointRadius: 3,
      tension: 0.3,
      fill: false,
    };
  });

  new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: { color: '#a07bb5', boxWidth: 12, font: { size: 11 } }
        },
      },
      scales: {
        x: { ticks: { color: '#a07bb5', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#a07bb5' }, grid: { color: 'rgba(255,255,255,0.05)' } },
      }
    }
  });
}

loadData()
  .then(render)
  .catch(err => {
    document.getElementById('app').innerHTML = `
      <div class="error">
        <p>⚠️ Could not load FPL data.</p>
        <p style="font-size:0.8rem;margin-top:8px;color:#a07bb5">${err.message}</p>
        <p style="font-size:0.8rem;margin-top:4px;color:#a07bb5">
          Run the GitHub Actions workflow to generate data/fpl_data.json
        </p>
      </div>`;
    document.getElementById('last-updated').textContent = '';
  });
</script>
</body>
</html>
